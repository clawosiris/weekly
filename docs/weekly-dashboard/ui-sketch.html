<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weekly Dashboard UI Sketch</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  main {
    max-width: 980px;
    margin: 32px auto;
    padding: 0 20px 40px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .title {
    font-size: 20px;
    font-weight: 650;
    fill: var(--fg);
  }

  .label {
    font-size: 14px;
    font-weight: 600;
    fill: var(--fg);
  }

  .small {
    font-size: 12px;
    fill: var(--muted);
  }

  .tiny {
    font-size: 10px;
    fill: var(--muted);
  }

  .node {
    stroke: var(--line);
    stroke-width: 1;
  }

  .neutral {
    fill: var(--neutral);
  }

  .input {
    fill: var(--input);
  }

  .process {
    fill: var(--process);
  }

  .storage {
    fill: var(--storage);
  }

  .external {
    fill: var(--external);
  }
</style>
<main>
  <svg viewBox="0 0 980 900" role="img" aria-labelledby="title desc">
    <title id="title">Weekly Dashboard UI Sketch</title>
    <desc id="desc">Original desktop and mobile wireframe for a weekly checklist dashboard.</desc>

    <text x="20" y="32" class="title">Weekly Dashboard UI Sketch</text>
    <text x="20" y="54" class="small">Original wireframe. Not a reproduction of the supplied reference image.</text>

    <text x="20" y="92" class="label">Desktop Browser</text>
    <rect x="20" y="110" width="620" height="430" rx="8" class="node neutral" />
    <rect x="42" y="132" width="576" height="54" rx="6" class="node input" />
    <text x="62" y="164" class="label">Weekly</text>
    <rect x="422" y="145" width="24" height="24" rx="4" class="node neutral" />
    <text x="431" y="162" class="small">&lt;</text>
    <rect x="454" y="145" width="112" height="24" rx="4" class="node neutral" />
    <text x="471" y="162" class="small">Week of Jul 20</text>
    <rect x="574" y="145" width="24" height="24" rx="4" class="node neutral" />
    <text x="584" y="162" class="small">&gt;</text>

    <rect x="42" y="198" width="576" height="34" rx="6" class="node neutral" />
    <rect x="54" y="204" width="92" height="22" rx="4" class="node process" />
    <text x="72" y="219" class="small">Dashboard</text>
    <text x="162" y="219" class="small">Mapper</text>

    <rect x="42" y="250" width="130" height="104" rx="6" class="node storage" />
    <text x="60" y="278" class="label">Weekly</text>
    <text x="60" y="305" class="title">68%</text>
    <text x="60" y="330" class="small">43 / 63 done</text>

    <rect x="190" y="250" width="185" height="104" rx="6" class="node external" />
    <text x="208" y="278" class="label">Completion by Day</text>
    <rect x="210" y="312" width="18" height="24" rx="2" class="node storage" />
    <rect x="238" y="300" width="18" height="36" rx="2" class="node storage" />
    <rect x="266" y="287" width="18" height="49" rx="2" class="node storage" />
    <rect x="294" y="319" width="18" height="17" rx="2" class="node storage" />
    <rect x="322" y="294" width="18" height="42" rx="2" class="node storage" />

    <rect x="394" y="250" width="224" height="104" rx="6" class="node process" />
    <text x="412" y="278" class="label">Weekly Matrix</text>
    <text x="412" y="306" class="small">Task</text>
    <text x="510" y="306" class="small">M T W T F S S</text>
    <text x="412" y="328" class="small">Water</text>
    <text x="510" y="328" class="small">x x x x x x x</text>

    <g>
      <rect x="42" y="374" width="128" height="136" rx="6" class="node neutral" />

      <text x="200" y="424" class="small">4 / 7 done</text>

      <text x="200" y="478" class="small">[x] Water</text>
      <text x="200" y="502" class="small">[x] Plan</text>

      <text x="342" y="424" class="small">6 / 8 done</text>
      <text x="342" y="454" class="small">[x] Walk</text>
      <text x="342" y="478" class="small">[ ] Meal log</text>
      <text x="342" y="502" class="small">[x] Inbox</text>

      <rect x="468" y="374" width="128" height="136" rx="6" class="node neutral" />
      <text x="484" y="402" class="label">Thursday</text>
      <text x="484" y="424" class="small">3 / 7 done</text>

      <text x="484" y="478" class="small">[ ] Water</text>
      <text x="484" y="502" class="small">[ ] Reset</text>
    </g>

    <text x="700" y="92" class="label">Mobile Phone</text>
    <rect x="700" y="110" width="230" height="570" rx="22" class="node neutral" />
    <rect x="718" y="132" width="194" height="56" rx="8" class="node input" />
    <text x="734" y="157" class="label">Weekly</text>
    <text x="734" y="178" class="small">[&lt;] Week of Jul 20 [&gt;]</text>

    <rect x="718" y="202" width="194" height="34" rx="6" class="node neutral" />
    <rect x="728" y="208" width="88" height="22" rx="4" class="node process" />
    <text x="742" y="223" class="small">Dashboard</text>
    <text x="832" y="223" class="small">Mapper</text>

    <rect x="718" y="252" width="194" height="74" rx="6" class="node storage" />

    <text x="734" y="306" class="title">68%</text>
    <text x="805" y="306" class="small">43 / 63 done</text>

    <rect x="718" y="344" width="194" height="132" rx="6" class="node neutral" />
    <text x="734" y="371" class="label">Monday</text>
    <text x="850" y="371" class="small">5 / 7</text>
    <text x="734" y="404" class="small">[x] Walk</text>
    <text x="734" y="428" class="small">[x] Drink water</text>
    <text x="734" y="452" class="small">[ ] Stretch</text>

    <rect x="718" y="494" width="194" height="132" rx="6" class="node neutral" />
    <text x="734" y="521" class="label">Tuesday</text>
    <text x="850" y="521" class="small">4 / 7</text>
    <text x="734" y="554" class="small">[ ] Walk</text>
    <text x="734" y="578" class="small">[x] Drink water</text>
    <text x="734" y="602" class="small">[x] Review priorities</text>

    <text x="20" y="592" class="label">Mapper Flow</text>
    <rect x="20" y="612" width="900" height="190" rx="8" class="node neutral" />
    <rect x="48" y="642" width="210" height="118" rx="6" class="node input" />
    <text x="68" y="672" class="label">Add Task</text>
    <text x="68" y="702" class="small">Name, category, selected days</text>
    <text x="68" y="728" class="small">Submit creates reusable task</text>

    <rect x="314" y="642" width="250" height="118" rx="6" class="node process" />
    <text x="334" y="672" class="label">Weekly Mapper</text>
    <text x="334" y="702" class="small">Toggle each task on Mon-Sun</text>
    <text x="334" y="728" class="small">Delete removes task definition</text>

    <rect x="620" y="642" width="250" height="118" rx="6" class="node storage" />
    <text x="640" y="672" class="label">Dashboard Updates</text>
    <text x="640" y="702" class="small">Day cards and progress refresh</text>
    <text x="640" y="728" class="small">Changes persist locally</text>

    <path d="M258 701 C278 701 294 701 314 701" stroke="#64748b" stroke-width="1.5" fill="none" />
    <path d="M564 701 C584 701 600 701 620 701" stroke="#64748b" stroke-width="1.5" fill="none" />
    <path d="M306 694 L314 701 L306 708" stroke="#64748b" stroke-width="1.5" fill="none" />
    <path d="M612 694 L620 701 L612 708" stroke="#64748b" stroke-width="1.5" fill="none" />
  </svg>
</main>
